services:
  server:
    build:
      context: ../../server
    environment:
      - VLESS_UUID=E5242418-1606-4737-88BD-0E6B289DC21E

  bridge:
    build:
      context: ../../bridge
    environment:
      - UPSTREAM_HOST=server
      - UPSTREAM_PORT=443
    depends_on:
      - server

  client:
    build:
      context: ../../client
    environment:
      - VLESS_UUID=E5242418-1606-4737-88BD-0E6B289DC21E
      - VLESS_ADDRESS=bridge
    ports:
      - "1080:1080"
    depends_on:
      - bridge

services:
  server:
    build:
      context: ./server
      args:
        VLESS_UUID: ${VLESS_UUID}
    expose:
      - "443"

  bridge:
    build:
      context: ./bridge
    environment:
      - UPSTREAM_HOST=${UPSTREAM_HOST:-server}
      - UPSTREAM_PORT=${UPSTREAM_PORT:-443}
      - LISTEN_PORT=443
    expose:
      - "443"
    depends_on:
      - server

  client:
    build:
      context: ./client
      args:
        VLESS_UUID: ${VLESS_UUID}
    ports:
      - "1080:1080"
    depends_on:
      - bridge

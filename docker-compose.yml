services:
  server:
    build:
      context: ./server
    environment:
      - VLESS_UUID=${VLESS_UUID}
    expose:
      - "443"

  bridge:
    build:
      context: ./bridge
    environment:
      - UPSTREAM_HOST=${UPSTREAM_HOST:-server}
      - UPSTREAM_PORT=${UPSTREAM_PORT:-443}
      - LISTEN_PORT=443
    expose:
      - "443"
    depends_on:
      - server

  xbridge:
    build:
      context: ./xbridge
    environment:
      - XRAY_CONFIG=${XRAY_CONFIG}
    expose:
      - "443"

  client:
    build:
      context: ./client
    environment:
      - VLESS_UUID=${VLESS_UUID}
      - VLESS_ADDRESS=${VLESS_ADDRESS:-xbridge}
      - VLESS_PORT=${VLESS_PORT:-443}
    ports:
      - "1080:1080"
    depends_on:
      - xbridge
